<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Sherwood RPG</title>
    <link rel="icon" type="image/png" href="assets/interface/logo.png">
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Georgia', serif;
            overflow: hidden;
            position: relative;
        }

        /* ===== СТАТУИ ===== */
        .statue-left {
            position: fixed;
            left: calc(50% - 240px - 12%);
            top: 0;
            width: 12%;
            height: 100%;
            background: url('assets/backgrounds/left_statue_of_the_main_screen.png') center/contain no-repeat;
            background-size: cover;
            z-index: 9999;
            pointer-events: none;
        }
        .statue-right {
            position: fixed;
            right: calc(50% - 240px - 12%);
            top: 0;
            width: 12%;
            height: 100%;
            background: url('assets/backgrounds/right_statue_of_the_main_screen.png') center/contain no-repeat;
            background-size: cover;
            z-index: 9999;
            pointer-events: none;
        }

        /* ===== РАЗДЕЛИТЕЛИ ===== */
        .divider-left {
            position: fixed;
            left: calc(50% - 240px - 12% + 12% - 8px);
            top: 0;
            width: 16px;
            height: 100%;
            background: url('assets/interface/vertical_screen_divider.png') center/contain no-repeat;
            background-size: cover;
            z-index: 9999;
            pointer-events: none;
        }
        .divider-right {
            position: fixed;
            right: calc(50% - 240px - 12% + 12% - 8px);
            top: 0;
            width: 16px;
            height: 100%;
            background: url('assets/interface/vertical_screen_divider.png') center/contain no-repeat;
            background-size: cover;
            z-index: 9999;
            pointer-events: none;
        }

        /* ===== ИГРОВОЙ КОНТЕЙНЕР (ШИРЕ, С ОГРАНИЧЕНИЕМ) ===== */
        #game-container {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            max-height: 900px;
            position: relative;
            background: #0a0a0f;
            overflow: hidden;
            border: 1px solid #2a2a3e;
            box-shadow: 0 0 60px rgba(0,0,0,0.9);
            z-index: 10;
        }

        .bg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('assets/backgrounds/homepage_screen.jpeg') center/cover no-repeat;
            z-index: 0;
        }

        /* ===== АРКА ===== */
        .arch-layer {
            position: absolute;
            bottom: 8%;
            left: 50%;
            transform: translateX(-50%);
            width: 90%;
            height: 65%;
            background: url('assets/interface/staircase_with_an_arch.png') bottom/contain no-repeat;
            z-index: 3;
            pointer-events: none;
        }

        /* ===== ГЕРОЙ + РАМКА ===== */
        .hero-frame {
            position: absolute;
            bottom: 10%;
            left: 50%;
            transform: translateX(-50%);
            width: 40%;
            height: 40%;
            z-index: 4;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
        }
        .hero-frame .video-bg {
            position: absolute;
            top: -8%;
            left: -8%;
            width: 116%;
            height: 116%;
            z-index: 0;
            pointer-events: none;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid rgba(201, 168, 76, 0.2);
            box-shadow: 0 0 30px rgba(201, 168, 76, 0.1);
        }
        .hero-frame .video-bg video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
        }
        .hero-frame img {
            position: relative;
            z-index: 1;
            width: 70%;
            height: 70%;
            object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.15));
        }

        /* ===== ЗАГРУЗОЧНЫЙ ЭКРАН ===== */
        .loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 30;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s ease;
            pointer-events: all;
        }
        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .loading-screen .loading-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('assets/backgrounds/loading_screen_with_logo.png') center/cover no-repeat;
            z-index: 0;
            pointer-events: none;
        }
        .loading-screen .play-btn {
            position: relative;
            z-index: 1;
            background: transparent;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            width: 140px;
            height: 140px;
            margin-top: 120px;
        }
        .loading-screen .play-btn img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 30px rgba(201, 168, 76, 0.3));
        }
        .loading-screen .play-btn:hover {
            transform: scale(1.05);
        }
        .loading-screen .play-btn:active {
            transform: scale(0.95);
        }

        /* ===== ОСНОВНОЙ ИНТЕРФЕЙС ===== */
        .main-interface {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: none;
            pointer-events: none;
        }
        .main-interface.active {
            display: block;
            pointer-events: all;
        }

        /* ===== ВЕРХНЯЯ ПАНЕЛЬ ===== */
        .top-panel {
            position: absolute;
            top: 3%;
            left: 18%;
            right: 18%;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 4px;
        }
        .top-panel .resource {
            width: 22%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .top-panel .resource img {
            width: 100%;
            max-width: 50px;
            height: auto;
        }
        .top-panel .resource span {
            color: #ffd700;
            font-size: 0.75em;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.9);
            margin-top: 2px;
            font-weight: bold;
        }
        .top-panel .resource.silver span {
            color: #c0c0c0;
        }
        .top-panel .exp-bar {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 4px;
        }
        .top-panel .exp-bar img {
            width: 100%;
            max-width: 140px;
            height: auto;
        }
        .top-panel .exp-bar .level-text {
            color: #e0c080;
            font-size: 0.65em;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.9);
            margin-top: 2px;
            letter-spacing: 1px;
        }

        /* ===== КНОПКИ ===== */
        .left-buttons,
        .right-buttons {
            position: absolute;
            top: 8%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 8px;
            pointer-events: all;
            width: 18%;
        }
        .left-buttons {
            left: 1.5%;
        }
        .right-buttons {
            right: 1.5%;
        }

        .left-buttons .btn,
        .right-buttons .btn {
            width: 100%;
            aspect-ratio: 1/1;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.5);
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: 0.15s;
            padding: 4px;
            gap: 2px;
        }
        .left-buttons .btn img,
        .right-buttons .btn img {
            width: 60%;
            height: 60%;
            object-fit: contain;
        }
        .left-buttons .btn .label,
        .right-buttons .btn .label {
            color: #c9a84c;
            font-size: 0.5em;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.9);
            text-align: center;
            line-height: 1.1;
        }
        .left-buttons .btn:hover,
        .right-buttons .btn:hover {
            background: rgba(201, 168, 76, 0.15);
            border-color: rgba(201, 168, 76, 0.5);
            transform: scale(1.05);
        }
        .left-buttons .btn:active,
        .right-buttons .btn:active {
            transform: scale(0.9);
        }

        /* ===== НИЖНИЕ СТАТЫ (ОПУЩЕНЫ) ===== */
        .bottom-stats {
            position: absolute;
            bottom: -15%;
            left: 10%;
            right: 10%;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            gap: 20px;
            pointer-events: none;
            padding-bottom: 0px;
        }
        .bottom-stats .stat-block {
            width: 46%;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(0, 0, 0, 0.15);
            border-radius: 12px;
            padding: 8px 6px;
        }
        .bottom-stats .stat-block .stat-board {
            width: 100%;
            height: auto;
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 8px;
        }
        .bottom-stats .stat-block .stat-board img {
            width: 100%;
            height: auto;
            object-fit: contain;
        }
        .bottom-stats .stat-block .stat-icons {
            display: flex;
            gap: 20px;
            align-items: center;
            margin-bottom: 4px;
        }
        .bottom-stats .stat-block .stat-icons img {
            width: 32px;
            height: 32px;
            object-fit: contain;
        }
        .bottom-stats .stat-block .stat-values {
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 0.8em;
            color: #e0c080;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.9);
            width: 100%;
        }
        .bottom-stats .stat-block .stat-values span {
            background: rgba(0, 0, 0, 0.5);
            padding: 2px 14px;
            border-radius: 6px;
            border: 1px solid rgba(201, 168, 76, 0.1);
            font-weight: bold;
        }
        .stat-values .attack {
            color: #f44336;
        }
        .stat-values .defense {
            color: #2196f3;
        }
        .stat-values .agility {
            color: #ff9800;
        }
        .stat-values .hp {
            color: #4caf50;
        }

        /* ===== ПЛЕЙСХОЛДЕР ===== */
        .placeholder-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 100;
            color: #e0c080;
            font-family: 'Georgia', serif;
            padding: 20px;
            pointer-events: all;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }
        .placeholder-screen .bg-placeholder {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: -1;
            background-size: cover !important;
            background-position: center !important;
            background-repeat: no-repeat !important;
            opacity: 1 !important;
        }
        .placeholder-screen .icon {
            font-size: 3em;
            margin-bottom: 16px;
        }
        .placeholder-screen .title {
            font-size: 1.2em;
            margin-bottom: 8px;
        }
        .placeholder-screen .sub {
            font-size: 0.7em;
            color: #888;
        }
        .placeholder-screen .back-btn {
            margin-top: 20px;
            background: transparent;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            width: 60px;
            height: 60px;
        }
        .placeholder-screen .back-btn img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 10px rgba(201, 168, 76, 0.2));
        }
        .placeholder-screen .back-btn:hover {
            transform: scale(1.05);
        }
        .placeholder-screen .back-btn:active {
            transform: scale(0.95);
        }

        @media (max-width: 400px) {
            .top-panel .resource span {
                font-size: 0.55em;
            }
            .top-panel .exp-bar .level-text {
                font-size: 0.5em;
            }
            .bottom-stats .stat-block .stat-values {
                font-size: 0.6em;
                gap: 12px;
            }
            .bottom-stats .stat-block .stat-icons img {
                width: 24px;
                height: 24px;
            }
            .bottom-stats .stat-block .stat-icons {
                gap: 14px;
            }
            .left-buttons .btn .label,
            .right-buttons .btn .label {
                font-size: 0.4em;
            }
            .loading-screen .play-btn {
                width: 100px;
                height: 100px;
                margin-top: 80px;
            }
            .statue-left,
            .statue-right {
                width: 8%;
            }
        }
    </style>
</head>
<body>

    <div class="statue-left"></div>
    <div class="statue-right"></div>
    <div class="divider-left"></div>
    <div class="divider-right"></div>

    <div id="game-container">

        <div class="bg-layer"></div>
        <div class="arch-layer"></div>

        <div class="hero-frame">
            <div class="video-bg">
                <video src="assets/animation/animation_frame_hero.webm" autoplay loop muted playsinline></video>
            </div>
            <img src="assets/hero_skins/skin_1_basic.png" alt="Герой">
        </div>

        <div class="loading-screen" id="loadingScreen">
            <div class="loading-bg"></div>
            <button class="play-btn" id="playBtn">
                <img src="assets/all_buttons/play.png" alt="Играть">
            </button>
        </div>

        <div class="main-interface" id="mainInterface">
            <div class="top-panel">
                <div class="resource"><img src="assets/interface/gold_plate.png" alt="Золото"><span id="gold-display">0</span></div>
                <div class="exp-bar"><img src="assets/interface/hero_experience_scale.png" alt="Опыт"><div class="level-text">УРОВЕНЬ <span id="level-display">1</span></div></div>
                <div class="resource silver"><img src="assets/interface/silver_plaque.png" alt="Серебро"><span id="silver-display">0</span></div>
            </div>

            <div class="left-buttons">
                <div class="btn" data-action="quest"><img src="assets/all_buttons/home.png" alt="Квест"><span class="label">Квест</span></div>
                <div class="btn" data-action="subway"><img src="assets/all_buttons/subway.png" alt="Подземка"><span class="label">Подземка</span></div>
                <div class="btn" data-action="raid"><img src="assets/all_buttons/raid.png" alt="Рейд"><span class="label">Рейд</span></div>
                <div class="btn" data-action="portal"><img src="assets/all_buttons/portal.png" alt="Портал"><span class="label">Портал</span></div>
                <div class="btn" data-action="arena"><img src="assets/all_buttons/arena.png" alt="Арена"><span class="label">Арена</span></div>
                <div class="btn" data-action="tavern"><img src="assets/all_buttons/tavern.png" alt="Таверна"><span class="label">Таверна</span></div>
                <div class="btn" data-action="settings"><img src="assets/all_buttons/settings.png" alt="Настройки"><span class="label">Настройки</span></div>
            </div>

            <div class="right-buttons">
                <div class="btn" data-action="daily"><img src="assets/all_buttons/daily_quests.png" alt="Ежедневные"><span class="label">Ежедневные</span></div>
                <div class="btn" data-action="training"><img src="assets/all_buttons/training.png" alt="Тренировка"><span class="label">Тренировка</span></div>
                <div class="btn" data-action="forge"><img src="assets/all_buttons/forge.png" alt="Кузница"><span class="label">Кузница</span></div>
                <div class="btn" data-action="bag"><img src="assets/all_buttons/hero_bag.png" alt="Сумка"><span class="label">Сумка</span></div>
                <div class="btn" data-action="market"><img src="assets/all_buttons/sherwood_market.png" alt="Рынок"><span class="label">Рынок</span></div>
                <div class="btn" data-action="bestiary"><img src="assets/all_buttons/bestiary.png" alt="Бестиарий"><span class="label">Бестиарий</span></div>
                <div class="btn" data-action="profile"><img src="assets/all_buttons/player_profile.png" alt="Профиль"><span class="label">Профиль</span></div>
            </div>

            <div class="bottom-stats">
                <div class="stat-block">
                    <div class="stat-board"><img src="assets/interface/damage_and_armor_stat_board.png" alt="Урон и защита"></div>
                    <div class="stat-icons">
                        <img src="assets/interface/icon_power.png" alt="Урон">
                        <img src="assets/interface/icon_defense.png" alt="Защита">
                    </div>
                    <div class="stat-values">
                        <span class="attack">0</span>
                        <span class="defense">0</span>
                    </div>
                </div>
                <div class="stat-block">
                    <div class="stat-board"><img src="assets/interface/stat_and_health_board.png" alt="Ловкость и здоровье"></div>
                    <div class="stat-icons">
                        <img src="assets/interface/icon_dexterity.png" alt="Ловкость">
                        <img src="assets/interface/icon_health.png" alt="Здоровье">
                    </div>
                    <div class="stat-values">
                        <span class="agility">0</span>
                        <span class="hp">0</span>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script>
        const SherwoodUI = {
            init() {
                this.container = document.getElementById('game-container');
                this.loadingScreen = document.getElementById('loadingScreen');
                this.mainInterface = document.getElementById('mainInterface');
                this.playBtn = document.getElementById('playBtn');
                this.bindButtons();
                this.bindPlayButton();
                this.updateDisplay();
                console.log('🏹 Sherwood UI инициализирован!');
            },
            bindPlayButton() {
                this.playBtn.addEventListener('click', () => {
                    this.loadingScreen.classList.add('hidden');
                    this.mainInterface.classList.add('active');
                    console.log('🎮 Игра запущена!');
                });
            },
            bindButtons() {
                document.querySelectorAll('.btn').forEach(el => {
                    el.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const action = el.dataset.action;
                        if (action && this[action]) this[action]();
                        else console.log('🔘 Кнопка:', action || 'без action');
                    });
                });
            },
            updateDisplay(data) {
                const d = data || { gold: 1234, silver: 5678, level: 5, attack: 124, defense: 87, agility: 43, hp: 320,
                        maxHp: 500 };
                document.getElementById('gold-display').textContent = this.formatNumber(d.gold);
                document.getElementById('silver-display').textContent = this.formatNumber(d.silver);
                document.getElementById('level-display').textContent = d.level;
                document.querySelector('.stat-values .attack').textContent = d.attack;
                document.querySelector('.stat-values .defense').textContent = d.defense;
                document.querySelector('.stat-values .agility').textContent = d.agility;
                document.querySelector('.stat-values .hp').textContent = d.hp + '/' + d.maxHp;
            },
            formatNumber(n) { return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' '); },
            quest() { this.showPlaceholder('📜 Квесты', 'quest_chapter_1.jpeg'); },
            subway() { this.showPlaceholder('🏚️ Подземка', 'underground_1_floor_1.jpg'); },
            raid() { this.showPlaceholder('⚔️ Рейд', 'subway_battle3.jpeg'); },
            portal() { this.showPlaceholder('🌀 Порталы', 'portal_1.jpeg'); },
            arena() { this.showPlaceholder('🏟️ Арена', 'arena.jpeg'); },
            tavern() { this.showPlaceholder('🍺 Таверна', 'tavern.jpeg'); },
            daily() { this.showPlaceholder('📋 Ежедневные задания', 'tasks.jpeg'); },
            training() { this.showPlaceholder('💪 Тренировка', 'training.jpeg'); },
            forge() { this.showPlaceholder('⚒️ Кузница', 'forge.jpeg'); },
            bag() { this.showPlaceholder('🎒 Сумка', 'bag.jpeg'); },
            market() { this.showPlaceholder('💰 Рынок', 'market.jpeg'); },
            bestiary() { this.showPlaceholder('📖 Бестиарий', 'bestiary.jpeg'); },
            profile() { this.showPlaceholder('👤 Профиль', 'character_page.jpeg'); },
            settings() { this.showPlaceholder('⚙️ Настройки', 'settings_page.jpeg'); },
            showPlaceholder(title, bg) {
                this.mainInterface.classList.remove('active');
                const old = document.querySelector('.placeholder-screen');
                if (old) old.remove();
                const div = document.createElement('div');
                div.className = 'placeholder-screen';
                div.innerHTML = `
                    <div class="bg-placeholder" style="background-image: url('assets/backgrounds/${bg || 'homepage_screen.jpeg'}');"></div>
                    <div class="icon">🏗️</div>
                    <div class="title">${title}</div>
                    <div class="sub">В разработке</div>
                    <button class="back-btn" onclick="SherwoodUI.backToMenu()">
                        <img src="assets/all_buttons/back.png" alt="Назад">
                    </button>
                `;
                this.container.appendChild(div);
                console.log('📌 Плейсхолдер:', title);
            },
            backToMenu() {
                const placeholder = document.querySelector('.placeholder-screen');
                if (placeholder) placeholder.remove();
                this.mainInterface.classList.add('active');
                console.log('🏠 Вернулись в меню');
            }
        };
        document.addEventListener('DOMContentLoaded', () => { SherwoodUI.init(); });
    </script>
</body>
</html>
