<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Sherwood RPG</title>
    <link rel="icon" type="image/png" href="assets/interface/logo.png">
    <link rel="manifest" href="manifest.json">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        body {
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Georgia', serif;
            overflow: hidden;
            position: relative;
        }

        .statue-left {
            position: fixed;
            left: calc(50% - 240px - 28%);
            top: 0;
            width: 28%;
            height: 100%;
            background: url('assets/backgrounds/left_statue_of_the_main_screen.png') center/contain no-repeat;
            background-size: cover;
            z-index: 9999;
            pointer-events: none;
        }
        .statue-right {
            position: fixed;
            right: calc(50% - 240px - 28%);
            top: 0;
            width: 28%;
            height: 100%;
            background: url('assets/backgrounds/right_statue_of_the_main_screen.png') center/contain no-repeat;
            background-size: cover;
            z-index: 9999;
            pointer-events: none;
        }

        .divider-left {
            position: fixed;
            left: calc(50% - 240px - 28% + 28% - 4px);
            top: 0;
            width: 8px;
            height: 100%;
            background: url('assets/interface/vertical_screen_divider.png') center/contain no-repeat;
            background-size: cover;
            z-index: 9999;
            pointer-events: none;
        }
        .divider-right {
            position: fixed;
            right: calc(50% - 240px - 28% + 28% - 4px);
            top: 0;
            width: 8px;
            height: 100%;
            background: url('assets/interface/vertical_screen_divider.png') center/contain no-repeat;
            background-size: cover;
            z-index: 9999;
            pointer-events: none;
        }

        #game-container {
            width: 100%;
            max-width: 480px;
            height: 100vh;
            max-height: 900px;
            position: relative;
            background: #0a0a0f;
            overflow: hidden;
            border: 1px solid #2a2a3e;
            box-shadow: 0 0 60px rgba(0,0,0,0.9);
            z-index: 10;
        }

        .bg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('assets/backgrounds/homepage_screen.jpeg') center/cover no-repeat;
            z-index: 0;
        }

        .arch-layer {
            position: absolute;
            bottom: 6%;
            left: 50%;
            transform: translateX(-50%);
            width: 95%;
            height: 65%;
            background: url('assets/interface/staircase_with_an_arch.png') bottom/contain no-repeat;
            z-index: 3;
            pointer-events: none;
        }

        .hero-frame {
            position: absolute;
            bottom: 24%;
            left: 50%;
            transform: translateX(-50%);
            width: 42%;
            height: 42%;
            z-index: 4;
            display: flex;
            align-items: flex-end;
            justify-content: center;
            pointer-events: none;
        }
        .hero-frame .video-bg {
            position: absolute;
            top: -8%;
            left: -8%;
            width: 116%;
            height: 116%;
            z-index: 0;
            pointer-events: none;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid rgba(201, 168, 76, 0.2);
            box-shadow: 0 0 30px rgba(201, 168, 76, 0.1);
        }
        .hero-frame .video-bg video {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.6;
        }
        .hero-frame img {
            position: relative;
            z-index: 1;
            width: 105%;
            height: 105%;
            object-fit: contain;
            object-position: bottom center;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.15));
        }

        .loading-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 30;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: opacity 0.6s ease;
            pointer-events: all;
        }
        .loading-screen.hidden {
            opacity: 0;
            pointer-events: none;
        }
        .loading-screen .loading-bg {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('assets/backgrounds/loading_screen_with_logo.png') center/cover no-repeat;
            z-index: 0;
            pointer-events: none;
        }
        .loading-screen .play-btn {
            position: relative;
            z-index: 1;
            background: transparent;
            border: none;
            cursor: pointer;
            transition: 0.2s;
            width: 140px;
            height: 140px;
            margin-top: 120px;
        }
        .loading-screen .play-btn img {
            width: 100%;
            height: 100%;
            object-fit: contain;
            filter: drop-shadow(0 0 30px rgba(201, 168, 76, 0.3));
        }
        .loading-screen .play-btn:hover { transform: scale(1.05); }
        .loading-screen .play-btn:active { transform: scale(0.95); }

        .main-interface {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            display: none;
            pointer-events: none;
        }
        .main-interface.active {
            display: block;
            pointer-events: all;
        }

        .top-panel {
            position: absolute;
            top: 2%;
            left: 8%;
            right: 8%;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 4px;
        }
        .top-panel .resource {
            width: 30%;
            display: flex;
            flex-direction: column;
            align-items: center;
            position: relative;
        }
        .top-panel .resource img {
            width: 100%;
            max-width: 100px;
            height: auto;
            display: block;
        }
        .top-panel .resource span {
            position: absolute;
            top: 50%;
            left: 52%;
            transform: translate(-50%, -50%);
            color: #ffd700;
            font-size: 0.9em;
            text-shadow: 0 0 10px rgba(0,0,0,0.9);
            font-weight: bold;
            white-space: nowrap;
        }
        .top-panel .resource.silver span { color: #c0c0c0; left: 50%; }

        .top-panel .exp-bar {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 4px;
            position: relative;
        }
        .top-panel .exp-bar img {
            width: 100%;
            max-width: 180px;
            height: auto;
            display: block;
        }
        .top-panel .exp-bar .exp-text {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #e0c080;
            font-size: 0.65em;
            text-shadow: 0 0 10px rgba(0,0,0,0.9);
            letter-spacing: 1px;
            white-space: nowrap;
            width: 100%;
            text-align: center;
        }

        .left-buttons, .right-buttons {
            position: absolute;
            top: 18%;
            bottom: 16%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            justify-content: center;
            gap: 4px;
            pointer-events: all;
            width: 19%;
        }
        .left-buttons { left: 1%; }
        .right-buttons { right: 1%; }

        .left-buttons .btn, .right-buttons .btn {
            width: 100%;
            aspect-ratio: 1/1;
            cursor: pointer;
            background: rgba(0,0,0,0.35);
            border: 1px solid rgba(201,168,76,0.15);
            border-radius: 10px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            transition: 0.15s;
            padding: 2px;
            gap: 1px;
            flex-shrink: 1;
            min-height: 0;
        }
        .left-buttons .btn img, .right-buttons .btn img {
            width: 60%;
            height: 60%;
            object-fit: contain;
        }
        .left-buttons .btn .label, .right-buttons .btn .label {
            color: #c9a84c;
            font-size: 0.45em;
            text-shadow: 0 0 10px rgba(0,0,0,0.9);
            text-align: center;
            line-height: 1.1;
        }
        .left-buttons .btn:hover, .right-buttons .btn:hover {
            background: rgba(201,168,76,0.15);
            border-color: rgba(201,168,76,0.5);
            transform: scale(1.05);
        }
        .left-buttons .btn:active, .right-buttons .btn:active { transform: scale(0.9); }

        .bottom-stats {
            position: absolute;
            bottom: 2%;
            left: 5%;
            right: 5%;
            z-index: 10;
            display: flex;
            justify-content: center;
            pointer-events: none;
        }
        .bottom-stats .stat-block {
            width: 90%;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: space-around;
            position: relative;
            padding: 6px 10px;
        }
        .bottom-stats .stat-block .stat-board {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 0;
        }
        .bottom-stats .stat-block .stat-board img {
            width: 100%;
            height: 100%;
            object-fit: fill;
            display: block;
            opacity: 0.8;
        }
        .bottom-stats .stat-block .stat-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            z-index: 1;
            min-width: 45px;
        }
        .bottom-stats .stat-block .stat-item img {
            width: 22px;
            height: 22px;
            object-fit: contain;
        }
        .bottom-stats .stat-block .stat-item .stat-value {
            font-size: 0.7em;
            font-weight: bold;
            text-shadow: 0 0 10px rgba(0,0,0,0.9);
            background: rgba(0,0,0,0.5);
            padding: 1px 6px;
            border-radius: 4px;
            border: 1px solid rgba(201,168,76,0.15);
            margin-top: 1px;
        }
        .stat-value.attack { color: #f44336; }
        .stat-value.defense { color: #2196f3; }
        .stat-value.agility { color: #ff9800; }
        .stat-value.hp { color: #4caf50; }
        .hit-epic-combo {
  animation: epicShockwave 0.25s cubic-bezier(0.25, 1, 0.5, 1);
}

@keyframes epicShockwave {
  0% {
    transform: rotate(0deg);
    filter: brightness(1) blur(0px) saturate(1);
  }
  15% {
    transform: rotate(-1.5deg);
    filter: brightness(1.6) saturate(1.8) blur(1px);
  }
  45% {
    transform: rotate(0.8deg);
    filter: brightness(1) saturate(1) blur(3px);
  }
  75% {
    transform: rotate(-0.3deg);
    filter: blur(1px);
  }
  100% {
    transform: rotate(0deg);
    filter: brightness(1) blur(0px) saturate(1);
  }
}

.hp-burn {
  transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1);
}

.hp-burn-flash {
  background: #ff4444 !important;
  transition: width 0.6s cubic-bezier(0.4, 0, 0.2, 1), background 0.3s ease !important;
}

        @media (max-width: 400px) {
            .top-panel .resource span { font-size: 0.7em; }
            .top-panel .exp-bar .exp-text { font-size: 0.5em; }
            .bottom-stats .stat-block .stat-item img { width: 18px; height: 18px; }
            .bottom-stats .stat-block .stat-item .stat-value { font-size: 0.55em; padding: 1px 4px; }
            .left-buttons .btn .label, .right-buttons .btn .label { font-size: 0.35em; }
            .loading-screen .play-btn { width: 100px; height: 100px; margin-top: 80px; }
            .statue-left, .statue-right { width: 20%; }
            .left-buttons, .right-buttons { width: 21%; top: 16%; bottom: 16%; }
        }
    </style>
</head>
<body>

    <div class="statue-left"></div>
    <div class="statue-right"></div>
    <div class="divider-left"></div>
    <div class="divider-right"></div>

    <div id="game-container">

        <div class="bg-layer"></div>
        <div class="arch-layer"></div>

        <div class="hero-frame">
            <div class="video-bg">
                <video src="assets/animation/animation_frame_hero.webm" autoplay loop muted playsinline></video>
            </div>
            <img src="assets/hero_skins/skin_1_basic.png" alt="Герой">
        </div>

        <div class="loading-screen" id="loadingScreen">
            <div class="loading-bg"></div>
            <button class="play-btn" id="playBtn">
                <img src="assets/all_buttons/play.png" alt="Играть">
            </button>
        </div>

        <div class="main-interface" id="mainInterface">
            <div class="top-panel">
                <div class="resource">
                    <img src="assets/interface/gold_plate.png" alt="Золото">
                    <span id="gold-display">0</span>
                </div>
                <div class="exp-bar">
                    <img src="assets/interface/hero_experience_scale.png" alt="Опыт">
                    <span class="exp-text"><span id="exp-display">0</span> / <span id="exp-max-display">100</span> XP</span>
                </div>
                <div class="resource silver">
                    <img src="assets/interface/silver_plaque.png" alt="Серебро">
                    <span id="silver-display">0</span>
                </div>
            </div>

            <div class="left-buttons">
                <div class="btn" data-action="quest"><img src="assets/all_buttons/home.png" alt="Квест"><span class="label">Квест</span></div>
                <div class="btn" data-action="subway"><img src="assets/all_buttons/subway.png" alt="Подземка"><span class="label">Подземка</span></div>
                <div class="btn" data-action="raid"><img src="assets/all_buttons/raid.png" alt="Рейд"><span class="label">Рейд</span></div>
                <div class="btn" data-action="portal"><img src="assets/all_buttons/portal.png" alt="Портал"><span class="label">Портал</span></div>
                <div class="btn" data-action="arena"><img src="assets/all_buttons/arena.png" alt="Арена"><span class="label">Арена</span></div>
                <div class="btn" data-action="tavern"><img src="assets/all_buttons/tavern.png" alt="Таверна"><span class="label">Таверна</span></div>
            </div>

            <div class="right-buttons">
                <div class="btn" data-action="daily"><img src="assets/all_buttons/daily_quests.png" alt="Ежедневные"><span class="label">Ежедневные</span></div>
                <div class="btn" data-action="bag"><img src="assets/all_buttons/hero_bag.png" alt="Сумка"><span class="label">Сумка</span></div>
                <div class="btn" data-action="market"><img src="assets/all_buttons/sherwood_market.png" alt="Рынок"><span class="label">Рынок</span></div>
                <div class="btn" data-action="profile"><img src="assets/all_buttons/player_profile.png" alt="Профиль"><span class="label">Профиль</span></div>
                <div class="btn" data-action="settings"><img src="assets/all_buttons/settings.png" alt="Настройки"><span class="label">Настройки</span></div>
                <div class="btn" data-action="chat"><img src="assets/all_buttons/chat_button.png" alt="Чат"><span class="label">Чат</span></div>
            </div>

            <div class="bottom-stats">
                <div class="stat-block">
                    <div class="stat-board"><img src="assets/interface/stone_slab_empty_plate.png" alt=""></div>
                    <div class="stat-item">
                        <img src="assets/interface/icon_power.png" alt="Урон">
                        <span class="stat-value attack">0</span>
                    </div>
                    <div class="stat-item">
                        <img src="assets/interface/icon_defense.png" alt="Защита">
                        <span class="stat-value defense">0</span>
                    </div>
                    <div class="stat-item">
                        <img src="assets/interface/icon_dexterity.png" alt="Ловкость">
                        <span class="stat-value agility">0</span>
                    </div>
                    <div class="stat-item">
                        <img src="assets/interface/icon_health.png" alt="Здоровье">
                        <span class="stat-value hp">0</span>
                    </div>
                </div>
            </div>
        </div>

    </div>

    <script src="js/sherwood/core.js"></script>
<script src="js/sherwood/models.js"></script>
<script src="js/sherwood/dungeon.js"></script>
<script src="js/sherwood/bag.js"></script>
<script src="js/sherwood/combat.js"></script>
<script src="js/sherwood/quests.js"></script>
<script src="js/sherwood/tavern.js"></script>
<script src="js/sherwood/portal.js"></script>
<script src="js/sherwood/forge.js"></script>
<script src="js/sherwood/raid.js"></script>
<script src="js/sherwood/blackmarket.js"></script>
<script src="js/sherwood/arena.js"></script>
<script src="js/sherwood/chat.js"></script>
<script src="js/sherwood/bestiary.js"></script>
<script src="js/sherwood/ui.js"></script>

</body>
</html>
