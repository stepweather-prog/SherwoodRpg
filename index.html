<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, maximum-scale=1.0">
    <title>Sherwood RPG</title>
    <link rel="icon" type="image/png" href="assets/interface/logo.png">
    <link rel="manifest" href="manifest.json">
    <style>
        /* ===== RESET ===== */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }

        body {
            background: #0a0a0f;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            font-family: 'Georgia', serif;
            overflow: hidden;
        }

        #game-container {
            width: 100%;
            max-width: 420px;
            height: 100vh;
            max-height: 900px;
            position: relative;
            background: #0a0a0f;
            overflow: hidden;
            border: 1px solid #2a2a3e;
            box-shadow: 0 0 60px rgba(0, 0, 0, 0.9);
        }

        /* ===== ФОН (100% ширины) ===== */
        .bg-layer {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: url('assets/backgrounds/homepage_screen.jpeg') center/cover no-repeat;
            z-index: 0;
        }

        /* ===== СТАТУИ (СНАРУЖИ, ЗА ГРАНИЦАМИ) ===== */
        .statue-left {
            position: absolute;
            left: -10%;
            top: 0;
            width: 30%;
            height: 100%;
            background: url('assets/backgrounds/left_statue_of_the_main_screen.png') center/contain no-repeat;
            z-index: 2;
            pointer-events: none;
        }

        .statue-right {
            position: absolute;
            right: -10%;
            top: 0;
            width: 30%;
            height: 100%;
            background: url('assets/backgrounds/right_statue_of_the_main_screen.png') center/contain no-repeat;
            z-index: 2;
            pointer-events: none;
        }

        /* ===== ВЕРТИКАЛЬНЫЕ РАЗДЕЛИТЕЛИ (ТВОИ) ===== */
        .divider-left {
            position: absolute;
            left: 14%;
            top: 0;
            width: 8px;
            height: 100%;
            background: url('assets/interface/vertical_screen_divider.png') center/cover no-repeat;
            z-index: 1;
            pointer-events: none;
        }

        .divider-right {
            position: absolute;
            right: 14%;
            top: 0;
            width: 8px;
            height: 100%;
            background: url('assets/interface/vertical_screen_divider.png') center/cover no-repeat;
            z-index: 1;
            pointer-events: none;
        }

        /* ===== ЛЕСТНИЦА С АРКОЙ (ПОДНЯТА ВЫШЕ) ===== */
        .arch-layer {
            position: absolute;
            bottom: 28%;
            left: 50%;
            transform: translateX(-50%);
            width: 50%;
            height: 40%;
            background: url('assets/interface/staircase_with_an_arch.png') bottom/contain no-repeat;
            z-index: 3;
            pointer-events: none;
        }

        /* ===== ВИДЕО-РАМКА ЗА ГЕРОЕМ ===== */
        .hero-frame {
            position: absolute;
            bottom: 32%;
            left: 50%;
            transform: translateX(-50%);
            width: 26%;
            height: 28%;
            z-index: 3;
            display: flex;
            align-items: center;
            justify-content: center;
            pointer-events: none;
            background: url('assets/animation/animation_frame_hero.webm') center/contain no-repeat;
        }

        .hero-frame img {
            width: 80%;
            height: 80%;
            object-fit: contain;
            filter: drop-shadow(0 0 20px rgba(255, 215, 0, 0.15));
            z-index: 4;
        }

        /* ===== ВЕРХНЯЯ ПАНЕЛЬ ===== */
        .top-panel {
            position: absolute;
            top: 3%;
            left: 18%;
            right: 18%;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 4px;
        }

        .top-panel .resource {
            width: 22%;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .top-panel .resource img {
            width: 100%;
            max-width: 40px;
            height: auto;
        }

        .top-panel .resource span {
            color: #ffd700;
            font-size: 0.65em;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.9);
            margin-top: 2px;
            font-weight: bold;
        }

        .top-panel .resource.silver span {
            color: #c0c0c0;
        }

        .top-panel .exp-bar {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            padding: 0 4px;
        }

        .top-panel .exp-bar img {
            width: 100%;
            max-width: 120px;
            height: auto;
        }

        .top-panel .exp-bar .level-text {
            color: #e0c080;
            font-size: 0.55em;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.9);
            margin-top: 2px;
            letter-spacing: 1px;
        }

        /* ===== ЛЕВЫЕ КНОПКИ ===== */
        .left-buttons {
            position: absolute;
            left: 2%;
            top: 22%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 3px;
            width: 13%;
        }

        .left-buttons .btn {
            width: 100%;
            aspect-ratio: 1/1;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.15s;
            padding: 2px;
        }

        .left-buttons .btn img {
            width: 80%;
            height: 80%;
            object-fit: contain;
        }

        .left-buttons .btn:hover {
            background: rgba(201, 168, 76, 0.15);
            border-color: rgba(201, 168, 76, 0.5);
            transform: scale(1.05);
        }

        .left-buttons .btn:active {
            transform: scale(0.9);
        }

        /* ===== ПРАВЫЕ КНОПКИ ===== */
        .right-buttons {
            position: absolute;
            right: 2%;
            top: 22%;
            z-index: 10;
            display: flex;
            flex-direction: column;
            gap: 3px;
            width: 13%;
        }

        .right-buttons .btn {
            width: 100%;
            aspect-ratio: 1/1;
            cursor: pointer;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(201, 168, 76, 0.2);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: 0.15s;
            padding: 2px;
        }

        .right-buttons .btn img {
            width: 80%;
            height: 80%;
            object-fit: contain;
        }

        .right-buttons .btn:hover {
            background: rgba(201, 168, 76, 0.15);
            border-color: rgba(201, 168, 76, 0.5);
            transform: scale(1.05);
        }

        .right-buttons .btn:active {
            transform: scale(0.9);
        }

        /* ===== НИЖНИЕ СТАТЫ (С ТВОИМИ ИКОНКАМИ) ===== */
        .bottom-stats {
            position: absolute;
            bottom: 3%;
            left: 18%;
            right: 18%;
            z-index: 10;
            display: flex;
            justify-content: space-between;
            gap: 8px;
        }

        .bottom-stats .stat-block {
            width: 44%;
            display: flex;
            flex-direction: column;
            align-items: center;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 6px;
            padding: 4px 0;
            border: 1px solid rgba(201, 168, 76, 0.1);
        }

        .bottom-stats .stat-block .stat-icons {
            display: flex;
            gap: 6px;
            align-items: center;
            margin-bottom: 2px;
        }

        .bottom-stats .stat-block .stat-icons img {
            width: 18px;
            height: 18px;
            object-fit: contain;
        }

        .bottom-stats .stat-block .stat-values {
            display: flex;
            justify-content: center;
            gap: 10px;
            font-size: 0.55em;
            color: #e0c080;
            text-shadow: 0 0 10px rgba(0, 0, 0, 0.9);
            width: 100%;
        }

        .bottom-stats .stat-block .stat-values span {
            background: rgba(0, 0, 0, 0.5);
            padding: 2px 8px;
            border-radius: 4px;
            border: 1px solid rgba(201, 168, 76, 0.1);
        }

        .stat-values .attack { color: #f44336; }
        .stat-values .defense { color: #2196f3; }
        .stat-values .agility { color: #ff9800; }
        .stat-values .hp { color: #4caf50; }

        /* ===== ПЛЕЙСХОЛДЕР ===== */
        .placeholder-screen {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background: rgba(10, 10, 15, 0.92);
            z-index: 100;
            color: #e0c080;
            font-family: 'Georgia', serif;
            padding: 20px;
        }

        .placeholder-screen .icon {
            font-size: 3em;
            margin-bottom: 16px;
        }

        .placeholder-screen .title {
            font-size: 1.2em;
            margin-bottom: 8px;
        }

        .placeholder-screen .sub {
            font-size: 0.7em;
            color: #888;
        }

        .placeholder-screen .back-btn {
            margin-top: 20px;
            background: rgba(201, 168, 76, 0.2);
            border: 1px solid rgba(201, 168, 76, 0.3);
            color: #e0c080;
            padding: 8px 24px;
            border-radius: 20px;
            cursor: pointer;
            font-family: 'Georgia', serif;
            font-size: 0.8em;
            transition: 0.15s;
        }

        .placeholder-screen .back-btn:hover {
            background: rgba(201, 168, 76, 0.3);
        }

        /* ===== АДАПТИВ ===== */
        @media (max-width: 400px) {
            .top-panel .resource span { font-size: 0.5em; }
            .top-panel .exp-bar .level-text { font-size: 0.45em; }
            .bottom-stats .stat-block .stat-values { font-size: 0.45em; gap: 6px; }
            .bottom-stats .stat-block .stat-icons img { width: 14px; height: 14px; }
        }
    </style>
</head>
<body>
    <div id="game-container">

        <!-- ФОН -->
        <div class="bg-layer"></div>

        <!-- СТАТУИ (СНАРУЖИ) -->
        <div class="statue-left"></div>
        <div class="statue-right"></div>

        <!-- ВЕРТИКАЛЬНЫЕ РАЗДЕЛИТЕЛИ (ТВОИ) -->
        <div class="divider-left"></div>
        <div class="divider-right"></div>

        <!-- ЛЕСТНИЦА С АРКОЙ (ПОДНЯТА) -->
        <div class="arch-layer"></div>

        <!-- ВИДЕО-РАМКА ЗА ГЕРОЕМ -->
        <div class="hero-frame">
            <img src="assets/hero_skins/skin_1_basic.png" alt="Герой" id="hero-skin">
        </div>

        <!-- ВЕРХНЯЯ ПАНЕЛЬ -->
        <div class="top-panel">
            <div class="resource">
                <img src="assets/interface/gold_plate.png" alt="Золото">
                <span id="gold-display">0</span>
            </div>
            <div class="exp-bar">
                <img src="assets/interface/hero_experience_scale.png" alt="Опыт">
                <div class="level-text">УРОВЕНЬ <span id="level-display">1</span></div>
            </div>
            <div class="resource silver">
                <img src="assets/interface/silver_plaque.png" alt="Серебро">
                <span id="silver-display">0</span>
            </div>
        </div>

        <!-- ЛЕВЫЕ КНОПКИ -->
        <div class="left-buttons">
            <div class="btn" data-action="quest"><img src="assets/all_buttons/play.png" alt="Квест"></div>
            <div class="btn" data-action="subway"><img src="assets/all_buttons/subway.png" alt="Подземка"></div>
            <div class="btn" data-action="raid"><img src="assets/all_buttons/raid.png" alt="Рейд"></div>
            <div class="btn" data-action="portal"><img src="assets/all_buttons/portal.png" alt="Портал"></div>
            <div class="btn" data-action="arena"><img src="assets/all_buttons/arena.png" alt="Арена"></div>
            <div class="btn" data-action="tavern"><img src="assets/all_buttons/tavern.png" alt="Таверна"></div>
            <div class="btn" data-action="settings"><img src="assets/all_buttons/settings.png" alt="Настройки"></div>
        </div>

        <!-- ПРАВЫЕ КНОПКИ -->
        <div class="right-buttons">
            <div class="btn" data-action="daily"><img src="assets/all_buttons/daily_quests.png" alt="Ежедневные"></div>
            <div class="btn" data-action="training"><img src="assets/all_buttons/training.png" alt="Тренировка"></div>
            <div class="btn" data-action="forge"><img src="assets/all_buttons/forge.png" alt="Кузница"></div>
            <div class="btn" data-action="bag"><img src="assets/all_buttons/hero_bag.png" alt="Сумка"></div>
            <div class="btn" data-action="market"><img src="assets/all_buttons/sherwood_market.png" alt="Рынок"></div>
            <div class="btn" data-action="bestiary"><img src="assets/all_buttons/bestiary.png" alt="Бестиарий"></div>
            <div class="btn" data-action="profile"><img src="assets/all_buttons/player_profile.png" alt="Профиль"></div>
        </div>

        <!-- НИЖНИЕ СТАТЫ (С ТВОИМИ ИКОНКАМИ) -->
        <div class="bottom-stats">
            <div class="stat-block">
                <div class="stat-icons">
                    <img src="assets/interface/damage_and_armor_stat_board.png" alt="Урон/Защита">
                </div>
                <div class="stat-values">
                    <span class="attack">⚔️ 0</span>
                    <span class="defense">🛡️ 0</span>
                </div>
            </div>
            <div class="stat-block">
                <div class="stat-icons">
                    <img src="assets/interface/stat_and_health_board.png" alt="Ловкость/Здоровье">
                </div>
                <div class="stat-values">
                    <span class="agility">💨 0</span>
                    <span class="hp">❤️ 0</span>
                </div>
            </div>
        </div>

    </div>

    <script>
        // ============================================================
        //  SHERWOOD UI — ПОЛНЫЙ КОНТРОЛЛЕР
        // ============================================================

        const SherwoodUI = {

            // -------- КОНСТАНТЫ --------
            SCREENS: {
                HOME: 'home',
                QUEST: 'quest',
                SUBWAY: 'subway',
                RAID: 'raid',
                PORTAL: 'portal',
                ARENA: 'arena',
                TAVERN: 'tavern',
                DAILY: 'daily',
                TRAINING: 'training',
                FORGE: 'forge',
                BAG: 'bag',
                MARKET: 'market',
                BESTIARY: 'bestiary',
                PROFILE: 'profile',
                SETTINGS: 'settings'
            },

            // -------- ИНИЦИАЛИЗАЦИЯ --------
            init() {
                this.container = document.getElementById('game-container');
                if (!this.container) {
                    console.error('❌ Контейнер #game-container не найден!');
                    return;
                }
                this.bindButtons();
                this.loadHome();
                this.updateDisplay();
                console.log('🏹 Sherwood UI инициализирован!');
            },

            // -------- ПРИВЯЗКА КНОПОК --------
            bindButtons() {
                document.querySelectorAll('.btn').forEach(el => {
                    el.addEventListener('click', (e) => {
                        e.stopPropagation();
                        const action = el.dataset.action;
                        if (action && this[action]) {
                            this[action]();
                        } else {
                            console.log('🔘 Кнопка:', action || 'без action');
                        }
                    });
                });
            },

            // -------- ОБНОВЛЕНИЕ ДАННЫХ --------
            updateDisplay(data) {
                const d = data || {
                    gold: 1234,
                    silver: 5678,
                    level: 5,
                    attack: 124,
                    defense: 87,
                    agility: 43,
                    hp: 320,
                    maxHp: 500
                };
                document.getElementById('gold-display').textContent = this.formatNumber(d.gold);
                document.getElementById('silver-display').textContent = this.formatNumber(d.silver);
                document.getElementById('level-display').textContent = d.level;
                document.querySelector('.stat-values .attack').textContent = '⚔️ ' + d.attack;
                document.querySelector('.stat-values .defense').textContent = '🛡️ ' + d.defense;
                document.querySelector('.stat-values .agility').textContent = '💨 ' + d.agility;
                document.querySelector('.stat-values .hp').textContent = '❤️ ' + d.hp + '/' + d.maxHp;
            },

            formatNumber(n) {
                return n.toString().replace(/\B(?=(\d{3})+(?!\d))/g, ' ');
            },

            // -------- НАВИГАЦИЯ --------
            home() {
                this.loadHome();
            },

            // --- ЛЕВАЯ КОЛОНКА ---
            quest() { this.showPlaceholder('📜 Квесты'); },
            subway() { this.showPlaceholder('🏚️ Подземка'); },
            raid() { this.showPlaceholder('⚔️ Рейд'); },
            portal() { this.showPlaceholder('🌀 Порталы'); },
            arena() { this.showPlaceholder('🏟️ Арена'); },
            tavern() { this.showPlaceholder('🍺 Таверна'); },

            // --- ПРАВАЯ КОЛОНКА ---
            daily() { this.showPlaceholder('📋 Ежедневные задания'); },
            training() { this.showPlaceholder('💪 Тренировка'); },
            forge() { this.showPlaceholder('⚒️ Кузница'); },
            bag() { this.showPlaceholder('🎒 Сумка'); },
            market() { this.showPlaceholder('💰 Рынок'); },
            bestiary() { this.showPlaceholder('📖 Бестиарий'); },
            profile() { this.showPlaceholder('👤 Профиль'); },

            // --- СИСТЕМНОЕ ---
            settings() { this.showPlaceholder('⚙️ Настройки'); },

            // -------- ОТОБРАЖЕНИЕ ЭКРАНОВ --------
            loadHome() {
                document.querySelectorAll('.bg-layer, .statue-left, .statue-right, .divider-left, .divider-right, .arch-layer, .hero-frame, .top-panel, .left-buttons, .right-buttons, .bottom-stats')
                    .forEach(el => el.style.display = '');
                const placeholder = document.querySelector('.placeholder-screen');
                if (placeholder) placeholder.remove();
                console.log('🏠 Главный экран');
            },

            showPlaceholder(title) {
                document.querySelectorAll('.bg-layer, .statue-left, .statue-right, .divider-left, .divider-right, .arch-layer, .hero-frame, .top-panel, .left-buttons, .right-buttons, .bottom-stats')
                    .forEach(el => el.style.display = 'none');

                const old = document.querySelector('.placeholder-screen');
                if (old) old.remove();

                const div = document.createElement('div');
                div.className = 'placeholder-screen';
                div.innerHTML = `
                    <div class="icon">🏗️</div>
                    <div class="title">${title}</div>
                    <div class="sub">В разработке</div>
                    <button class="back-btn" onclick="SherwoodUI.home()">← На главную</button>
                `;
                this.container.appendChild(div);
                console.log('📌 Плейсхолдер:', title);
            }
        };

        // ============================================================
        //  ЗАПУСК
        // ============================================================

        document.addEventListener('DOMContentLoaded', () => {
            SherwoodUI.init();
        });
    </script>

</body>
</html>
