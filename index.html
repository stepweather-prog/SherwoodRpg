<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1a2a1a">
    <title>Sherwood RPG</title>
    <link rel="manifest" href="manifest.json">
    <link rel="icon" type="image/png" href="assets/icons/01icon.png">
    <style>
        :root, [data-theme="forest"] { 
            --bg-primary: #1a2a1a; --bg-primary-rgb: 26, 42, 26;
            --bg-secondary: #0d1a0d; --bg-secondary-rgb: 13, 26, 13;
            --accent: #6b9b5a; --accent-rgb: 107, 155, 90;
            --accent-light: #8bc47a; --accent-light-rgb: 139, 196, 122;
            --text: #c8e0c8; --text-bright: #d8f0d8; --text-dim: #709870;
            --border: #6b9b5a;
            --btn-bg: rgba(107,155,90,0.1); --btn-border: rgba(107,155,90,0.3);
            --danger: #f44336; --seeding-color: #4caf50;
        }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
        html, body { height:100%; overflow:hidden; font-family:'Segoe UI','Inter',sans-serif; font-size:clamp(14px,2.5vw,16px); }
        body { background:var(--bg-primary); color:var(--text); display:flex; flex-direction:column; height:100dvh; }
        #game-container { flex:1; overflow-y:auto; }
        .hidden { display:none !important; }
    </style>
</head>
<body>
    <div id="game-container"></div>

    <!-- Firebase -->
    <script src="firebase-config.js"></script>
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
        import { getDatabase, ref, set, get, onValue, off, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";
        import { getAuth, signInAnonymously } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
        const firebaseConfig = window.FIREBASE_CONFIG || {};
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app);
        const auth = getAuth(app);
        signInAnonymously(auth).then(() => console.log('🔥 Firebase: OK')).catch(err => console.error('Firebase error:', err));
        window.firebaseDB = db; window.firebaseRef = ref; window.firebaseSet = set; 
        window.firebaseGet = get; window.firebaseOnValue = onValue; window.firebaseOff = off; 
        window.firebaseServerTimestamp = serverTimestamp;
    </script>

    <!-- P2P + Crypto -->
    <script src="crypto-worker.js"></script>
    <script src="p2ppong.js"></script>

    <!-- Sherwood Game Engine -->
    <script src="js/sherwood/core.js"></script>
    <script src="js/sherwood/models.js"></script>
    <script src="js/sherwood/data/monsters.js"></script>
    <script src="js/sherwood/data/equipment.js"></script>
    <script src="js/sherwood/router.js"></script>
    <script src="js/sherwood/combat.js"></script>
    <script src="js/sherwood/quests.js"></script>
    <script src="js/sherwood/dungeon.js"></script>
    <script src="js/sherwood/arena.js"></script>
    <script src="js/sherwood/tavern.js"></script>
    <script src="js/sherwood/blackmarket.js"></script>
    <script src="js/sherwood/events.js"></script>
    <script src="js/sherwood/ui.js"></script>

    <script>
        // Запуск игры
        (function startGame() {
            if (window.Sherwood) {
                Sherwood.init().then(() => {
                    // Перенаправляем контейнер UI на #game-container
                    Sherwood.UI._container = document.getElementById('game-container');
                    Sherwood.UI._container.style.cssText = 'width:100%;height:100%;overflow-y:auto;';
                    Sherwood.UI._container.style.display = 'block';
                    
                    Sherwood.UI.showMainMenu();
                    Sherwood.Router.navigate('main_menu');
                    Sherwood.Quests.init();
                    Sherwood.Dungeon.init();
                    Sherwood.Arena.init();
                    Sherwood.Tavern.init();
                    Sherwood.BlackMarket.init();
                    Sherwood.Events.init();
                    
                    document.getElementById('game-container').classList.remove('hidden');
                    console.log('🏹 Sherwood RPG готов!');
                });
            } else {
                setTimeout(startGame, 100);
            }
        })();
    </script>
</body>
</html>
